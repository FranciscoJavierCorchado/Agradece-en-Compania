<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRADECE | LOGIN</title>


    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap">

</head>
<body>
    <header>
        <div>

        </div>
    </header>
    <main>
        <div class="incio-sesion-container">
            <h2>Inicia sesión para continuar</h2>

            <form action="#" method="post">
                <hr>
                <div class="formulario">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" name="correo" id="email">
                </div>
                
                <div class="formulario">
                    <label for="pw">Contraseña</label>
                    <input type="password" name="pw" id="contraseña">
                </div>
                
                <div class="opciones">
                    <label class="recordar">
                        <input type="checkbox" name="ck" id="checkbox"> Recordarme
                    </label>
                    <a href="#" class="olvidar-contraseña">¿Olvidaste tu contraseña?</a>
                </div>
                
                <input type="submit" value="ENVIAR">
            </form>
        </div>
    </main>
</body>
</html>
